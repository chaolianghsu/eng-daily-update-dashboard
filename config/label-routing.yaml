# Label → Repo routing configuration
#
# Updated via PR. Reviewed by eng lead.
# Drift audit runs monthly via scripts/audit-routing-config.mjs → DM's
# user when actual repo (based on recent fix patterns) differs from config.
#
# See docs/superpowers/plans/2026-04-22-issue-routing.md for design rationale.

labels:
  K5:
    product: KEYPO
    primary_group: KEYPO
    default_assignees:
      - Joyce
    known_exceptions:
      # Cross-group exceptions(真 exception,不在 primary_group 內):
      - llmprojects/keypo-agent
      - CrawlersV2/bigcrawler-scrapy
      # K5 issues about crawling/data-source problems are routinely fixed
      # in bigcrawler-scrapy (17/31 fixtures in B2b baseline 2026-04-23).

      # Explicit enumeration of active KEYPO/* repos so phase1 LLM has
      # concrete candidates (primary_group name alone is too abstract for
      # good suggestions). Top active repos as of 2026-04-22.
      # Fanti-prefixed repos (KEYPO/fanti_*) intentionally excluded —
      # those belong to the Fanti label, not K5.
      - KEYPO/keypo-backend
      - KEYPO/keypo-frontend-2023
      - KEYPO/keypo-engine-api
      - KEYPO/keypo-engine/keypo-engine-api-v3
      - KEYPO/keypo-engine/keypo-engine-api-gateway
      - KEYPO/keypo-engine/on-premises-api-gateway
      - KEYPO/keypo-engine/keypo-engine-gateway
      - KEYPO/keypo-engine/data-collector
      - KEYPO/keypo-engine/analyzer-and-qtool-testcase
      - KEYPO/keypo-engine/qtool
      - KEYPO/keypo-q-huaan-v2
      - KEYPO/keypo-newsletter
      - KEYPO/keypo-international-website
      - KEYPO/line-notify-backend-2023
      - KEYPO/keypo-data-api
      - KEYPO/keypo-engine-layer
      - KEYPO/keypo-questionnaire
      - KEYPO/keypo-micro-portal
      - KEYPO/keypo-status-check
      # Regenerate via drift audit or GitLab API query on KEYPO/* activity.

  BD:
    product: BigData
    primary_group: bigdata
    known_exceptions:
      - bigdata1  # experimental / poc fork group

  DV:
    product: DailyView
    primary_group: dailyview
    known_exceptions:
      - dv-report
      - dv-survey

  Fanti:
    product: Fanti
    primary_group: null  # intentionally cross-group — no single primary
    layers:
      crawler:
        - CrawlersV2/fanti-insights-api
      backend:
        - cdp/fanti-insights-backend
        - cdp/fanti-review-backend
      ui:
        - cdp/fanti-insights-dashboard
        - cdp/fanti-review-dashboard
      nginx:
        - cdp/fanti-review-nginx
        - cdp/fanti-insights-nginx
      keypo_integration:
        - KEYPO/fanti_info_web
        - KEYPO/fanti_manager

  Data:
    product: Data ops
    primary_group: Crawlers
    default_assignees:
      - Walt
    known_exceptions:
      - CrawlersV2
      - bigdata1

  信義:
    product: Xinyi
    primary_group: sinyi

# Labels that are type/priority metadata, not product routing signals
ignore_for_routing:
  - P1_高
  - P2_中
  - P3_低
  - Bug
  - Feature

# Repo-level descriptions injected into Phase 1 prompt as routing hints.
# Purpose: help the LLM disambiguate between similarly-named KEYPO repos when
# R@3 is already high but P@1 is low (diagnosed 2026-04-23 stratified baseline:
# P@1=0.60 vs R@3=0.92). Seed descriptions are team-reviewed best-effort;
# refine via PR as routing post-mortems surface better wording.
repo_descriptions:
  # KEYPO core (K5 label)
  KEYPO/keypo-backend: |
    主 API / 後台 server。處理流程/權限/通知/後台 CRUD 等「非資料計算」
    類問題:user / auth / 試用帳號到期 / portal 後台操作 / 速報寄送與推播
    排程 / AI 報告的產生流程與下載鏈路 / 通知 (LINE 以外) / agent 錯誤訊息
    顯示邏輯。不處理資料查詢計算本身 — 若 issue 是「查出來的數字不對」、
    「資料內容錯誤」、「資料沒進來」、「AI 報告內容/文章列表對不上實際
    聲量」,那是 keypo-engine-api 的職責,不是這裡。
  KEYPO/keypo-frontend-2023: |
    前端 React SPA(使用者 UI 畫面)。限定純畫面層問題:版面錯位、圖表
    渲染失敗、按鈕無反應、樣式異常、文字顯示錯誤。若「看到錯誤的資料」、
    「篩選選項不對」、「下拉名稱重複/不完整」這類看似 UI 但實際是資料
    內容錯誤,不在這裡修 — 那是 keypo-engine-api 或 keypo-backend 的資料
    層問題。
  KEYPO/keypo-engine-api: |
    資料查詢引擎對外 API — 所有「資料本身」與「查詢計算邏輯」的問題。
    包括:探索概念、主題查詢、聲量數值計算與閾值判斷、AI 報告內的資料
    分析與「聲量不足/聲量過多」類判讀邏輯、港版/日版/海外資料庫查詢、
    頻道/來源篩選的資料清單(名稱重複、來源缺失、分類錯誤)、文章列表
    與實際聲量對不上。關鍵區分:issue 只要提到「數字不對」、「查出錯誤
    資料」、「AI 報告分析結果錯誤」、「聲量/來源不完整」就屬於這裡,
    而不是 keypo-backend(後者只負責流程/通知/後台操作)。
  KEYPO/keypo-engine/keypo-engine-api-v3: |
    engine-api v3(次世代查詢 API)。新版查詢介面、新 schema 相關問題。
  KEYPO/keypo-engine/keypo-engine-api-gateway: |
    engine API gateway(內部路由/限流/認證層)。多半是連線、授權、429
    等 gateway 層問題,極少涉及資料本身。
  KEYPO/keypo-engine/on-premises-api-gateway: |
    on-premises(客戶私有部署)專用的 engine gateway。只有 on-prem 客戶
    的環境問題才在這裡。
  KEYPO/keypo-engine/data-collector: |
    engine 內部的資料收集器。資料進來得太慢 / 缺漏 / 排程失敗等 pipeline
    問題,但不是爬蟲端(爬蟲見 CrawlersV2/bigcrawler-scrapy)。
  KEYPO/keypo-engine/qtool: |
    內部查詢工具(eng 除錯 / 資料人員用)。工具 bug 才在這裡。
  KEYPO/keypo-newsletter: |
    電子報/定期郵件發送服務。收信異常、排程、格式、寄件人錯誤。
  KEYPO/keypo-data-api: |
    對外資料 API(非 engine-api)。外部整合合作夥伴拉資料的 API。
  KEYPO/keypo-micro-portal: |
    小型入口網站(特定活動 / 合作網站)。
  KEYPO/keypo-status-check: |
    服務健康檢查。status 頁面 / uptime 監控相關。
  KEYPO/keypo-q-huaan-v2: |
    華安客製版(客戶專案)。只有華安客戶相關才路由到這裡。
  KEYPO/keypo-international-website: |
    國際版官網(marketing 頁面)。
  KEYPO/line-notify-backend-2023: |
    LINE 通知的 backend。LINE 群組推播失敗 / 格式錯誤等。
  KEYPO/keypo-engine-layer: |
    engine 的共用 layer(shared library)。較少直接 routing,多為上游修
    時順帶修補。
  KEYPO/keypo-questionnaire: |
    問卷系統。問卷題目、填答流程、結果匯出。

  # Crawlers (K5 label cross-group + Data label)
  CrawlersV2/bigcrawler-scrapy: |
    主要新聞來源爬蟲。新聞網站沒有文章、來源斷線、數量不對、抓不到新
    文章,多半在這裡修。是 K5 label 下最常被修的「資料來源層」問題的
    歸屬處。
  llmprojects/keypo-agent: |
    KEYPO 的 LLM agent 實作(對話、工具呼叫、回覆邏輯)。agent 對話
    功能本身的 bug(卡住、回覆錯、工具呼叫失敗)在這裡;而 agent 的
    「錯誤訊息顯示」問題通常在 keypo-backend。
