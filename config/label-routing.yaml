# Label → Repo routing configuration
#
# Updated via PR. Reviewed by eng lead.
# Drift audit runs monthly via scripts/audit-routing-config.mjs → DM's
# user when actual repo (based on recent fix patterns) differs from config.
#
# See docs/superpowers/plans/2026-04-22-issue-routing.md for design rationale.

labels:
  K5:
    product: KEYPO
    primary_group: KEYPO
    known_exceptions:
      # Cross-group exceptions(真 exception,不在 primary_group 內):
      - llmprojects/keypo-agent

      # Explicit enumeration of active KEYPO/* repos so phase1 LLM has
      # concrete candidates (primary_group name alone is too abstract for
      # good suggestions). Top active repos as of 2026-04-22.
      # Fanti-prefixed repos (KEYPO/fanti_*) intentionally excluded —
      # those belong to the Fanti label, not K5.
      - KEYPO/keypo-backend
      - KEYPO/keypo-frontend-2023
      - KEYPO/keypo-engine-api
      - KEYPO/keypo-engine/keypo-engine-api-v3
      - KEYPO/keypo-engine/keypo-engine-api-gateway
      - KEYPO/keypo-engine/on-premises-api-gateway
      - KEYPO/keypo-engine/keypo-engine-gateway
      - KEYPO/keypo-engine/data-collector
      - KEYPO/keypo-engine/analyzer-and-qtool-testcase
      - KEYPO/keypo-engine/qtool
      - KEYPO/keypo-q-huaan-v2
      - KEYPO/keypo-newsletter
      - KEYPO/keypo-international-website
      - KEYPO/line-notify-backend-2023
      - KEYPO/keypo-data-api
      - KEYPO/keypo-engine-layer
      - KEYPO/keypo-questionnaire
      - KEYPO/keypo-micro-portal
      - KEYPO/keypo-status-check
      # Regenerate via drift audit or GitLab API query on KEYPO/* activity.

  BD:
    product: BigData
    primary_group: bigdata
    known_exceptions:
      - bigdata1  # experimental / poc fork group

  DV:
    product: DailyView
    primary_group: dailyview
    known_exceptions:
      - dv-report
      - dv-survey

  Fanti:
    product: Fanti
    primary_group: null  # intentionally cross-group — no single primary
    layers:
      crawler:
        - CrawlersV2/fanti-insights-api
      backend:
        - cdp/fanti-insights-backend
        - cdp/fanti-review-backend
      ui:
        - cdp/fanti-insights-dashboard
        - cdp/fanti-review-dashboard
      nginx:
        - cdp/fanti-review-nginx
        - cdp/fanti-insights-nginx
      keypo_integration:
        - KEYPO/fanti_info_web
        - KEYPO/fanti_manager

  Data:
    product: Data ops
    primary_group: Crawlers
    known_exceptions:
      - CrawlersV2
      - bigdata1

  信義:
    product: Xinyi
    primary_group: sinyi

# Labels that are type/priority metadata, not product routing signals
ignore_for_routing:
  - P1_高
  - P2_中
  - P3_低
  - Bug
  - Feature
