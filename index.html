<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工程部 Daily Update Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      background-image: radial-gradient(ellipse at 15% -5%, rgba(59,130,246,0.07) 0%, transparent 55%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .animate-in { animation: fadeInUp 0.45s ease-out both; }

    .member-card {
      transition: transform 0.2s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .member-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      border-color: rgba(59,130,246,0.3) !important;
    }

    .date-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
    }
    .date-scroll::-webkit-scrollbar { display: none; }
    .date-btn {
      flex-shrink: 0;
      scroll-snap-align: start;
      transition: all 0.2s ease;
    }
    .date-btn:hover { background: rgba(59,130,246,0.1) !important; }

    .tab-btn { transition: all 0.2s ease; }
    .tab-btn:hover:not(.tab-active) { background: rgba(148,163,184,0.1) !important; }

    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .attention-card:hover { transform: translateY(-1px); }

    @media (max-width: 768px) {
      .dashboard-container { padding: 16px 12px !important; }
      .dashboard-title { font-size: 20px !important; }
      .dashboard-subtitle { font-size: 11px !important; }
      .tab-bar { width: 100% !important; }
      .tab-btn { flex: 1 !important; padding: 8px 6px !important; font-size: 11px !important; text-align: center !important; white-space: nowrap; }
      .member-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
      .status-overview { flex-direction: column !important; }
      .status-kpis { border-right: none !important; border-bottom: 1px solid #334155 !important; justify-content: space-around !important; }
      .footer-bar { flex-direction: column !important; align-items: flex-start !important; }
      .week-label { font-size: 12px !important; }
      .card-panel { padding: 16px 12px 6px !important; }
    }

    @media (max-width: 480px) {
      .member-grid { grid-template-columns: 1fr !important; }
      .dashboard-container { padding: 12px 8px !important; }
      .dashboard-title { font-size: 18px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect, useMemo } = React;
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer, ReferenceLine, Cell, LineChart, Line,
  ComposedChart, Area, ScatterChart, Scatter, ZAxis, LabelList
} = window.Recharts;

// ═══════════════════════════════════════════════════════════
// 📌 DATA — 從 raw_data.json 載入，每天只需更新該檔案
// ═══════════════════════════════════════════════════════════

const COLORS = {
  bg: "#0f172a", card: "#1e293b", border: "#334155",
  text: "#e2e8f0", textMuted: "#94a3b8", textDim: "#64748b",
  accent: "#3b82f6", accentLight: "#60a5fa",
  green: "#22c55e", greenDim: "#166534",
  yellow: "#eab308", yellowDim: "#854d0e",
  red: "#ef4444", redDim: "#991b1b",
  orange: "#f97316", orangeDim: "#7c2d12",
  purple: "#a78bfa",
  teal: "#06b6d4", tealDim: "#164e63",
};

const SEVERITY_COLORS = {
  "🔴": { sc: COLORS.red, bg: COLORS.redDim },
  "🟡": { sc: COLORS.yellow, bg: COLORS.yellowDim },
  "🟠": { sc: COLORS.orange, bg: COLORS.orangeDim },
  "🟢": { sc: COLORS.green, bg: COLORS.greenDim },
};

const THRESHOLDS = { overtime: 10, high: 8.5, target: 8, ok: 6.5, low: 5 };
const MEETING_HEAVY_PCT = 50;

// ═══════════════════════════════════════════════════════════
// 🔧 AUTO-COMPUTED
// ═══════════════════════════════════════════════════════════

function dateToNum(d) { const p = d.split("/").map(Number); return p[0] * 100 + p[1]; }
function isOnLeave(date, leaveRanges) {
  if (!date || !leaveRanges) return false;
  const dn = dateToNum(date);
  return leaveRanges.some(r => dn >= dateToNum(r.start) && dn <= dateToNum(r.end));
}

function getStatus(hours, onLeave) {
  if (hours === null && onLeave) return { label: "休假", color: COLORS.orange, bg: COLORS.orangeDim };
  if (hours === null) return { label: "未回報", color: COLORS.red, bg: COLORS.redDim };
  if (hours > THRESHOLDS.overtime) return { label: "超時", color: COLORS.red, bg: COLORS.redDim };
  if (hours >= THRESHOLDS.high) return { label: "偏高", color: COLORS.yellow, bg: COLORS.yellowDim };
  if (hours >= THRESHOLDS.ok) return { label: "合理", color: COLORS.green, bg: COLORS.greenDim };
  if (hours >= THRESHOLDS.low) return { label: "偏低", color: COLORS.orange, bg: COLORS.orangeDim };
  return { label: "不足", color: COLORS.red, bg: COLORS.redDim };
}

function getBarColor(hours) {
  if (hours === null || hours === 0) return COLORS.textDim;
  if (hours > THRESHOLDS.high) return COLORS.yellow;
  if (hours >= THRESHOLDS.ok) return COLORS.accentLight;
  if (hours >= THRESHOLDS.low) return COLORS.orange;
  return COLORS.red;
}

function getTrendIcon(v1, v2) {
  if (v1 === null || v2 === null) return "—";
  const d = v2 - v1;
  if (d > 1) return "📈";
  if (d > 0) return "↗";
  if (d < -1) return "📉";
  if (d < 0) return "↘";
  return "➡️";
}

function getWeekRange(refDate) {
  const d = new Date(refDate);
  const day = d.getDay();
  const diff = day === 0 ? 6 : day - 1;
  const monday = new Date(d);
  monday.setDate(d.getDate() - diff);
  monday.setHours(0, 0, 0, 0);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  friday.setHours(23, 59, 59, 999);
  return { monday, friday };
}

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{
      background: COLORS.card, border: `1px solid ${COLORS.border}`,
      borderRadius: 8, padding: "12px 16px", fontSize: 13,
      boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
    }}>
      <p style={{ color: COLORS.text, fontWeight: 700, marginBottom: 8, fontSize: 14 }}>{label}</p>
      {payload.filter(p => p.value !== null && p.value !== undefined).map((p, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: p.color || p.stroke, display: "inline-block", flexShrink: 0 }} />
          <span style={{ color: COLORS.textMuted, minWidth: 36 }}>{p.name}:</span>
          <span style={{ color: COLORS.text, fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
            {p.value}hr
          </span>
        </div>
      ))}
    </div>
  );
};

const CardPanel = ({ title, children, padding }) => (
  <div className="card-panel" style={{ background: COLORS.card, borderRadius: 12, padding: padding || "20px 16px 8px", border: `1px solid ${COLORS.border}`, marginBottom: 20 }}>
    <p style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 12, fontWeight: 600 }}>{title}</p>
    {children}
  </div>
);

const ColorDot = ({ color }) => (
  <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: color, marginRight: 8, verticalAlign: "middle" }} />
);

const StatusBadge = ({ status }) => (
  <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 4, background: status.bg, color: status.color }}>
    {status.label}
  </span>
);

const tabStyle = (active) => ({
  padding: "8px 20px", borderRadius: 8, border: "none", cursor: "pointer",
  fontSize: 13, fontWeight: 600, fontFamily: "inherit",
  background: active ? COLORS.accent : "transparent",
  color: active ? "#fff" : COLORS.textMuted,
});

function CommitsView({ commitData, dates, members, memberColors, leave, activeDate, onDateSelect, dailyDates, dayLabels }) {
  const { commits, analysis, projectRisks } = commitData;
  const [expandedMember, setExpandedMember] = useState(null);

  const gridDates = dates.filter(d => analysis[d]);

  const projectSet = new Set();
  const memberProjectCounts = {};
  const dateCommits = commits[activeDate] || {};
  for (const [member, data] of Object.entries(dateCommits)) {
    if (!memberProjectCounts[member]) memberProjectCounts[member] = {};
    for (const item of data.items) {
      projectSet.add(item.project);
      memberProjectCounts[member][item.project] = (memberProjectCounts[member][item.project] || 0) + 1;
    }
  }
  const allProjects = [...projectSet].sort();
  const projectColors = {};
  const projectPalette = ["#06b6d4","#22c55e","#f59e0b","#ef4444","#a78bfa","#ec4899","#f97316","#14b8a6","#6366f1","#84cc16"];
  allProjects.forEach((p, i) => { projectColors[p] = projectPalette[i % projectPalette.length]; });

  const barData = Object.entries(memberProjectCounts)
    .map(([member, projects]) => ({ member, ...projects, _total: Object.values(projects).reduce((a, b) => a + b, 0) }))
    .sort((a, b) => b._total - a._total);

  const memberCommitList = {};
  const dateCommitsForDetail = commits[activeDate] || {};
  for (const [member, data] of Object.entries(dateCommitsForDetail)) {
    if (!memberCommitList[member]) memberCommitList[member] = [];
    for (const item of data.items) {
      memberCommitList[member].push({ date: activeDate, ...item });
    }
  }

  const consistencyStyle = (status) => {
    const map = { "\u2705": { c: COLORS.green, b: COLORS.greenDim }, "\u26A0\uFE0F": { c: COLORS.yellow, b: COLORS.yellowDim } };
    const s = map[status] || (SEVERITY_COLORS[status] ? { c: SEVERITY_COLORS[status].sc, b: SEVERITY_COLORS[status].bg } : { c: COLORS.textDim, b: COLORS.border });
    return s;
  };
  const statusColor = s => consistencyStyle(s).c;
  const statusBg = s => consistencyStyle(s).b;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ marginBottom: 20 }}>
        <div className="date-scroll">
          {dailyDates.map(d => (
            <button key={d} className="date-btn" onClick={() => onDateSelect(d)}
              style={{
                padding: "8px 20px", borderRadius: 8, cursor: "pointer",
                fontSize: 13, fontWeight: 600, fontFamily: "inherit",
                border: activeDate === d ? `2px solid ${COLORS.teal}` : `1px solid ${COLORS.border}`,
                background: activeDate === d ? "rgba(6,182,212,0.15)" : "transparent",
                color: activeDate === d ? COLORS.teal : COLORS.textMuted,
              }}
            >{d}（{dayLabels[d]}）</button>
          ))}
        </div>
      </div>
      {/* Correlation Overview */}
      {(() => {
        const dateAnalysis = analysis[activeDate] || {};
        const dateCommitData = commits[activeDate] || {};

        // Build scatter data for members with any data on activeDate
        const scatterData = [];
        const noData = [];

        members.forEach(m => {
          const a = dateAnalysis[m];
          const onLv = leave[m] && leave[m].some(r => {
            const dn = activeDate.split('/').map(Number);
            const sn = r.start.split('/').map(Number);
            const en = r.end.split('/').map(Number);
            return (dn[0]*100+dn[1]) >= (sn[0]*100+sn[1]) && (dn[0]*100+dn[1]) <= (en[0]*100+en[1]);
          });

          if (onLv) {
            noData.push({ name: m, reason: '休假' });
            return;
          }
          if (!a) {
            noData.push({ name: m, reason: '無資料' });
            return;
          }

          scatterData.push({
            name: m,
            hours: a.hours || 0,
            commits: a.commitCount || 0,
            status: a.status,
            color: memberColors[m],
          });
        });

        // Sort summary by commits descending
        const sortedSummary = [...scatterData].sort((a, b) => b.commits - a.commits);

        return (
          <CardPanel title={`工時 × Commits 關聯分析（${activeDate}）`}>
            <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
              {/* Scatter Chart */}
              <div style={{ flex: "1 1 400px", minWidth: 300 }}>
                <ResponsiveContainer width="100%" height={300}>
                  <ScatterChart margin={{ top: 20, right: 20, bottom: 20, left: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} />
                    <XAxis
                      type="number"
                      dataKey="hours"
                      name="工時"
                      unit="hr"
                      domain={[0, 'auto']}
                      tick={{ fill: COLORS.textDim, fontSize: 11 }}
                      axisLine={{ stroke: COLORS.border }}
                      tickLine={false}
                      label={{ value: "Daily Update 工時 (hr)", position: "bottom", offset: 0, fill: COLORS.textDim, fontSize: 11 }}
                    />
                    <YAxis
                      type="number"
                      dataKey="commits"
                      name="Commits"
                      domain={[0, 'auto']}
                      tick={{ fill: COLORS.textDim, fontSize: 11 }}
                      axisLine={{ stroke: COLORS.border }}
                      tickLine={false}
                      label={{ value: "Commits", angle: -90, position: "insideLeft", offset: 10, fill: COLORS.textDim, fontSize: 11 }}
                    />
                    <ZAxis range={[120, 120]} />
                    <Tooltip
                      cursor={{ strokeDasharray: '3 3', stroke: COLORS.textDim }}
                      content={({ active, payload }) => {
                        if (!active || !payload?.length) return null;
                        const d = payload[0]?.payload;
                        if (!d) return null;
                        return (
                          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", boxShadow: "0 8px 32px rgba(0,0,0,0.5)" }}>
                            <div style={{ fontWeight: 700, color: d.color, marginBottom: 4 }}>{d.name} {d.status}</div>
                            <div style={{ fontSize: 12, color: COLORS.textMuted }}>工時：{d.hours}hr</div>
                            <div style={{ fontSize: 12, color: COLORS.textMuted }}>Commits：{d.commits}</div>
                          </div>
                        );
                      }}
                    />
                    <Scatter data={scatterData} isAnimationActive={false}>
                      {scatterData.map((entry, i) => (
                        <Cell key={i} fill={entry.color} stroke={entry.color} fillOpacity={0.8} />
                      ))}
                      <LabelList dataKey="name" position="top" style={{ fill: COLORS.textMuted, fontSize: 11, fontWeight: 600 }} />
                    </Scatter>
                    {/* Quadrant reference lines */}
                    <ReferenceLine x={6.5} stroke={COLORS.textDim} strokeDasharray="4 4" strokeWidth={0.5} />
                    <ReferenceLine y={scatterData.length > 0 ? Math.max(1, Math.round(scatterData.reduce((s, d) => s + d.commits, 0) / Math.max(1, scatterData.filter(d => d.commits > 0).length))) : 1} stroke={COLORS.textDim} strokeDasharray="4 4" strokeWidth={0.5} />
                  </ScatterChart>
                </ResponsiveContainer>
                {/* Quadrant legend */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, marginTop: 4, padding: "0 10px" }}>
                  <span style={{ fontSize: 10, color: COLORS.textDim }}>↙ 低工時 · 少 commits</span>
                  <span style={{ fontSize: 10, color: COLORS.textDim, textAlign: "right" }}>↘ 高工時 · 少 commits（⚠️ 非 coding）</span>
                  <span style={{ fontSize: 10, color: COLORS.textDim }}>↖ 低工時 · 多 commits（🔴 低估？）</span>
                  <span style={{ fontSize: 10, color: COLORS.textDim, textAlign: "right" }}>↗ 高工時 · 多 commits（✅ 一致）</span>
                </div>
              </div>

              {/* Summary Table */}
              <div style={{ flex: "1 1 300px", minWidth: 250 }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr>
                      <th style={{ padding: "6px 8px", textAlign: "left", color: COLORS.textMuted, fontWeight: 600, borderBottom: `1px solid ${COLORS.border}` }}>成員</th>
                      <th style={{ padding: "6px 8px", textAlign: "center", color: COLORS.textMuted, fontWeight: 600, borderBottom: `1px solid ${COLORS.border}` }}>工時</th>
                      <th style={{ padding: "6px 8px", textAlign: "center", color: COLORS.teal, fontWeight: 600, borderBottom: `1px solid ${COLORS.border}` }}>Commits</th>
                      <th style={{ padding: "6px 8px", textAlign: "center", color: COLORS.textMuted, fontWeight: 600, borderBottom: `1px solid ${COLORS.border}` }}>狀態</th>
                      <th style={{ padding: "6px 8px", textAlign: "left", color: COLORS.textMuted, fontWeight: 600, borderBottom: `1px solid ${COLORS.border}` }}>Projects</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedSummary.map(d => {
                      const memberCommitData = dateCommitData[d.name];
                      const projects = memberCommitData ? memberCommitData.projects : [];
                      return (
                        <tr key={d.name} style={{ borderBottom: `1px solid ${COLORS.border}15` }}>
                          <td style={{ padding: "6px 8px", fontWeight: 600 }}>
                            <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: d.color, marginRight: 6, verticalAlign: "middle" }} />
                            {d.name}
                          </td>
                          <td style={{ padding: "6px 8px", textAlign: "center", fontVariantNumeric: "tabular-nums", color: d.hours > 0 ? COLORS.text : COLORS.textDim }}>
                            {d.hours > 0 ? `${d.hours}hr` : '—'}
                          </td>
                          <td style={{ padding: "6px 8px", textAlign: "center", fontVariantNumeric: "tabular-nums", fontWeight: 700, color: d.commits > 0 ? COLORS.teal : COLORS.textDim }}>
                            {d.commits > 0 ? d.commits : '—'}
                          </td>
                          <td style={{ padding: "6px 8px", textAlign: "center", fontSize: 14 }}>{d.status}</td>
                          <td style={{ padding: "6px 8px", fontSize: 11, color: COLORS.textMuted }}>
                            {projects.map(p => p.split('/').pop()).join(', ') || '—'}
                          </td>
                        </tr>
                      );
                    })}
                    {noData.map(d => (
                      <tr key={d.name} style={{ borderBottom: `1px solid ${COLORS.border}15`, opacity: 0.5 }}>
                        <td style={{ padding: "6px 8px", fontWeight: 600, color: COLORS.textDim }}>
                          <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: COLORS.textDim, marginRight: 6, verticalAlign: "middle" }} />
                          {d.name}
                        </td>
                        <td colSpan={3} style={{ padding: "6px 8px", textAlign: "center", color: COLORS.textDim, fontSize: 11 }}>{d.reason}</td>
                        <td />
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </CardPanel>
        );
      })()}
      {/* Consistency Grid — Enhanced */}
      <CardPanel title="一致性檢查（每日明細）">
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 2, fontSize: 12 }}>
            <thead>
              <tr>
                <th style={{ padding: "6px 10px", textAlign: "left", color: COLORS.textMuted, fontWeight: 600, fontSize: 11, whiteSpace: "nowrap", position: "sticky", left: 0, background: COLORS.card, zIndex: 1 }}>成員</th>
                {gridDates.map(d => (
                  <th key={d} onClick={() => onDateSelect(d)} style={{
                    padding: "6px 6px", textAlign: "center", fontSize: 10, cursor: "pointer",
                    fontWeight: d === activeDate ? 700 : 400,
                    color: d === activeDate ? COLORS.teal : COLORS.textMuted,
                    background: d === activeDate ? COLORS.tealDim + "40" : "transparent",
                    borderRadius: "6px 6px 0 0",
                    transition: "all 0.15s ease",
                  }}>{d}</th>
                ))}
                <th style={{ padding: "6px 8px", textAlign: "center", color: COLORS.teal, fontWeight: 600, fontSize: 10, whiteSpace: "nowrap" }}>合計</th>
              </tr>
            </thead>
            <tbody>
              {members.filter(m => gridDates.some(d => analysis[d]?.[m])).map(m => {
                // Member totals
                let totalCommits = 0, activeDays = 0;
                gridDates.forEach(d => {
                  const a = analysis[d]?.[m];
                  if (a && a.commitCount > 0) { totalCommits += a.commitCount; activeDays++; }
                });
                return (
                  <tr key={m}>
                    <td style={{ padding: "4px 10px", color: COLORS.text, fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", position: "sticky", left: 0, background: COLORS.card, zIndex: 1 }}>
                      <span style={{ display: "inline-block", width: 7, height: 7, borderRadius: "50%", background: memberColors[m] || COLORS.textDim, marginRight: 6, verticalAlign: "middle" }} />
                      {m}
                    </td>
                    {gridDates.map(d => {
                      const a = analysis[d]?.[m];
                      const onLeaveDay = leave[m] && leave[m].some(r => {
                        const dn = d.split('/').map(Number);
                        const sn = r.start.split('/').map(Number);
                        const en = r.end.split('/').map(Number);
                        return (dn[0]*100+dn[1]) >= (sn[0]*100+sn[1]) && (dn[0]*100+dn[1]) <= (en[0]*100+en[1]);
                      });

                      const isActive = d === activeDate;
                      let bg, color, topLabel, bottomLabel, tooltip;

                      if (a) {
                        const intensity = Math.min(1, 0.3 + (a.commitCount / 20) * 0.7);
                        const baseColor = a.status === '✅' ? COLORS.green : a.status === '⚠️' ? COLORS.yellow : COLORS.red;
                        const baseBg = a.status === '✅' ? COLORS.greenDim : a.status === '⚠️' ? COLORS.yellowDim : COLORS.redDim;
                        bg = baseBg + Math.round(intensity * 255).toString(16).padStart(2, '0');
                        color = baseColor;
                        topLabel = a.commitCount > 0 ? a.commitCount : '—';
                        bottomLabel = a.hours != null ? a.hours + 'h' : '?';
                        tooltip = `${m} ${d}\n${a.status} Commits: ${a.commitCount} | 工時: ${a.hours || '未報'}hr`;
                      } else if (onLeaveDay) {
                        bg = COLORS.orangeDim + '44';
                        color = COLORS.orange;
                        topLabel = '假';
                        bottomLabel = '';
                        tooltip = `${m} ${d}\n休假`;
                      } else {
                        bg = 'transparent';
                        color = COLORS.textDim;
                        topLabel = '·';
                        bottomLabel = '';
                        tooltip = `${m} ${d}\n無資料`;
                      }

                      return (
                        <td key={d} title={tooltip} onClick={() => onDateSelect(d)} style={{
                          padding: 0, textAlign: "center", cursor: "pointer",
                          background: isActive ? COLORS.tealDim + "30" : "transparent",
                          borderLeft: isActive ? `1px solid ${COLORS.teal}33` : "1px solid transparent",
                          borderRight: isActive ? `1px solid ${COLORS.teal}33` : "1px solid transparent",
                        }}>
                          <div style={{
                            margin: "1px auto", width: 38, padding: "3px 2px", borderRadius: 5,
                            background: bg, transition: "all 0.15s ease",
                            display: "flex", flexDirection: "column", alignItems: "center", gap: 0,
                          }}>
                            <span style={{ fontSize: 12, fontWeight: 700, color, lineHeight: 1.3, fontVariantNumeric: "tabular-nums" }}>{topLabel}</span>
                            {bottomLabel && <span style={{ fontSize: 9, color: COLORS.textDim, lineHeight: 1.2, fontVariantNumeric: "tabular-nums" }}>{bottomLabel}</span>}
                          </div>
                        </td>
                      );
                    })}
                    {/* Member total column */}
                    <td style={{ padding: "4px 8px", textAlign: "center" }}>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: totalCommits > 0 ? COLORS.teal : COLORS.textDim, fontVariantNumeric: "tabular-nums" }}>{totalCommits || '—'}</span>
                        {activeDays > 0 && <span style={{ fontSize: 9, color: COLORS.textDim }}>{activeDays}d</span>}
                      </div>
                    </td>
                  </tr>
                );
              })}
              {/* Summary row */}
              <tr>
                <td style={{ padding: "6px 10px", color: COLORS.textMuted, fontWeight: 600, fontSize: 11, borderTop: `1px solid ${COLORS.border}`, position: "sticky", left: 0, background: COLORS.card, zIndex: 1 }}>合計</td>
                {gridDates.map(d => {
                  const dateMembers = analysis[d] || {};
                  const totalC = Object.values(dateMembers).reduce((s, a) => s + (a.commitCount || 0), 0);
                  const hoursArr = Object.values(dateMembers).filter(a => a.hours != null).map(a => a.hours);
                  const avgH = hoursArr.length ? (hoursArr.reduce((a, b) => a + b, 0) / hoursArr.length).toFixed(1) : null;
                  const isActive = d === activeDate;
                  return (
                    <td key={d} onClick={() => onDateSelect(d)} style={{
                      padding: "4px 4px", textAlign: "center", cursor: "pointer",
                      borderTop: `1px solid ${COLORS.border}`,
                      background: isActive ? COLORS.tealDim + "30" : "transparent",
                    }}>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: totalC > 0 ? COLORS.teal : COLORS.textDim, fontVariantNumeric: "tabular-nums" }}>{totalC || '—'}</span>
                        {avgH && <span style={{ fontSize: 9, color: COLORS.textDim }}>{avgH}h</span>}
                      </div>
                    </td>
                  );
                })}
                <td style={{ borderTop: `1px solid ${COLORS.border}` }} />
              </tr>
            </tbody>
          </table>
        </div>
        {/* Legend */}
        <div style={{ display: "flex", gap: 16, marginTop: 10, paddingTop: 8, borderTop: `1px solid ${COLORS.border}`, flexWrap: "wrap" }}>
          {[
            { label: "✅ 工時+Commits 一致", bg: COLORS.greenDim, color: COLORS.green },
            { label: "⚠️ 有工時，無 Commits", bg: COLORS.yellowDim, color: COLORS.yellow },
            { label: "🔴 有 Commits，未回報", bg: COLORS.redDim, color: COLORS.red },
            { label: "假 休假", bg: COLORS.orangeDim, color: COLORS.orange },
          ].map(l => (
            <span key={l.label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: COLORS.textDim }}>
              <span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: l.bg, border: `1px solid ${l.color}33` }} />
              {l.label}
            </span>
          ))}
          <span style={{ fontSize: 10, color: COLORS.textDim, marginLeft: "auto" }}>上方=commits 下方=工時 | 點擊日期切換</span>
        </div>
      </CardPanel>

      {/* Project Participation */}
      {allProjects.length > 0 && (
        <CardPanel title={`專案參與度（${activeDate}）`}>
          <ResponsiveContainer width="100%" height={barData.length * 36 + 40}>
            <BarChart data={barData} layout="vertical" margin={{ left: 60, right: 20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} />
              <XAxis type="number" tick={{ fill: COLORS.textDim, fontSize: 11 }} axisLine={{ stroke: COLORS.border }} tickLine={false} />
              <YAxis type="category" dataKey="member" width={50} tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, color: COLORS.text }} />
              {allProjects.map(p => (
                <Bar key={p} dataKey={p} stackId="a" fill={projectColors[p]} name={p.split('/').pop()} />
              ))}
            </BarChart>
          </ResponsiveContainer>
          {projectRisks.length > 0 && (
            <div style={{ marginTop: 12, display: "flex", flexWrap: "wrap", gap: 8 }}>
              {projectRisks.map(r => (
                <span key={r.project} style={{ padding: "4px 10px", borderRadius: 6, fontSize: 12, background: COLORS.yellowDim, color: COLORS.yellow }}>
                  {"\u26A0\uFE0F"} {r.project.split('/').pop()} — 僅 {r.soloContributor} 貢獻
                </span>
              ))}
            </div>
          )}
        </CardPanel>
      )}

      {/* Commit Detail */}
      <CardPanel title={`Commit 明細（${activeDate}）`}>
        {Object.entries(memberCommitList).sort((a, b) => b[1].length - a[1].length).map(([member, items]) => (
          <div key={member} style={{ marginBottom: 8 }}>
            <button
              onClick={() => setExpandedMember(expandedMember === member ? null : member)}
              style={{ width: "100%", textAlign: "left", background: "transparent", border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "8px 12px", color: COLORS.text, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontFamily: "inherit", fontSize: 13 }}
            >
              <span>{member}</span>
              <span style={{ color: COLORS.teal }}>{items.length} commits {expandedMember === member ? "\u25B2" : "\u25BC"}</span>
            </button>
            {expandedMember === member && (
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginTop: 4 }}>
                <tbody>
                  {items.sort((a, b) => b.date.localeCompare(a.date)).map((item, i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                      <td style={{ padding: "4px 8px", color: COLORS.textMuted, width: 40 }}>{item.date}</td>
                      <td style={{ padding: "4px 8px", color: COLORS.teal, width: 120, fontSize: 11 }}>{item.project.split('/').pop()}</td>
                      <td style={{ padding: "4px 8px", color: COLORS.text }}>{item.title}</td>
                      <td style={{ padding: "4px 8px", width: 70 }}>
                        {item.url ? (
                          <a href={item.url} target="_blank" rel="noopener noreferrer"
                            style={{ color: COLORS.teal, fontFamily: "JetBrains Mono, SF Mono, monospace", fontSize: 11, textDecoration: "none" }}
                            onMouseOver={e => e.target.style.textDecoration = "underline"}
                            onMouseOut={e => e.target.style.textDecoration = "none"}
                          >{item.sha}</a>
                        ) : (
                          <span style={{ color: COLORS.textDim, fontFamily: "JetBrains Mono, SF Mono, monospace", fontSize: 11 }}>{item.sha}</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        ))}
      </CardPanel>
    </div>
  );
}

function Dashboard() {
  const [view, setView] = useState("daily");
  const [rawData, setRawData] = useState(null);
  const [issues, setIssues] = useState([]);
  const [leave, setLeave] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedDate, setSelectedDate] = useState(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
  const [commitData, setCommitData] = useState(null);
  const [selectedMembers, setSelectedMembers] = useState(new Set());
  const [trendRange, setTrendRange] = useState("2weeks");

  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  useEffect(() => {
    Promise.all([
      fetch("raw_data.json").then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      fetch("gitlab-commits.json").then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([rawDataResp, commitResp]) => {
      setRawData(rawDataResp.rawData);
      setIssues(rawDataResp.issues || []);
      setLeave(rawDataResp.leave || {});
      setCommitData(commitResp);
      setLoading(false);
    }).catch(err => {
      setError(err.message);
      setLoading(false);
    });
  }, []);

  const dates = rawData ? Object.keys(rawData) : [];
  const members = rawData ? [...new Set(dates.flatMap(d => Object.keys(rawData[d])))] : [];
  const weekDays = ["日", "一", "二", "三", "四", "五", "六"];
  const dayLabels = Object.fromEntries(dates.map(d => {
    const [m, dd] = d.split("/").map(Number);
    const dow = new Date(new Date().getFullYear(), m - 1, dd).getDay();
    return [d, weekDays[dow]];
  }));
  const palette = ["#f472b6", "#a78bfa", "#60a5fa", "#34d399", "#fbbf24", "#fb923c", "#22d3ee", "#c084fc", "#4ade80", "#f87171", "#38bdf8", "#a3a3a3", "#e879f9", "#facc15", "#2dd4bf", "#f43f5e"];
  const memberColors = Object.fromEntries(members.map((m, i) => [m, palette[i % palette.length]]));
  const issueMap = Object.fromEntries(issues.map(iss => [iss.member, iss]));

  // Current week date filter for daily view
  const currentWeek = useMemo(() => {
    if (!dates.length) return { dates: [], label: "" };
    const year = new Date().getFullYear();
    const { monday, friday } = getWeekRange(new Date());

    let weekDates = dates.filter(d => {
      const [m, dd] = d.split('/').map(Number);
      const date = new Date(year, m - 1, dd);
      return date >= monday && date <= friday;
    });

    const fmtDate = (dt) => `${dt.getMonth()+1}/${dt.getDate()}`;
    let label = `本週 ${fmtDate(monday)} – ${fmtDate(friday)}`;

    if (weekDates.length === 0 && dates.length > 0) {
      const latest = dates[dates.length - 1];
      const [lm, ld] = latest.split('/').map(Number);
      const latestDate = new Date(year, lm - 1, ld);
      const { monday: pMon, friday: pFri } = getWeekRange(latestDate);
      weekDates = dates.filter(d => {
        const [m, dd] = d.split('/').map(Number);
        const date = new Date(year, m - 1, dd);
        return date >= pMon && date <= pFri;
      });
      label = `${fmtDate(pMon)} – ${fmtDate(pFri)} 週`;
    }

    return { dates: weekDates, label };
  }, [dates]);

  const dailyDates = currentWeek.dates;
  const activeDate = (selectedDate && dailyDates.includes(selectedDate))
    ? selectedDate
    : dailyDates[dailyDates.length - 1] || dates[dates.length - 1];

  const chartHeight = isMobile ? 280 : 380;

  const dailyBarData = useMemo(() => {
    if (!rawData || !activeDate) return [];
    return members.map(m => {
      const d = rawData[activeDate]?.[m] || { total: null, meeting: null, dev: null };
      return { name: m, 開發: d.dev, 會議: d.meeting, total: d.total };
    }).sort((a, b) => (b.total || -1) - (a.total || -1));
  }, [rawData, activeDate, members]);

  const trendDates = useMemo(() => {
    const limits = { week: 5, "2weeks": 10, month: 22, all: Infinity };
    const n = limits[trendRange] || Infinity;
    return n >= dates.length ? dates : dates.slice(-n);
  }, [dates, trendRange]);

  const trendData = useMemo(() => {
    if (!rawData) return [];
    return trendDates.map(date => {
      const row = { date: `${date}（${dayLabels[date]}）` };
      const vals = [];
      members.forEach(m => {
        const v = rawData[date]?.[m]?.total ?? null;
        row[m] = v;
        if (v !== null) vals.push(v);
      });
      row['團隊平均'] = vals.length ? +(vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
      row['_min'] = vals.length ? Math.min(...vals) : null;
      row['_max'] = vals.length ? Math.max(...vals) : null;
      if (commitData?.commits?.[date]) {
        for (const m of members) {
          row[`_commit_${m}`] = commitData.commits[date]?.[m]?.count || 0;
        }
      }
      return row;
    });
  }, [rawData, trendDates, members, dayLabels, commitData]);

  const useWeeklyAgg = trendRange === 'month' || trendRange === 'all';

  const weekGroups = useMemo(() => {
    if (!useWeeklyAgg || !trendDates.length) return [];
    const year = new Date().getFullYear();
    const groups = [];
    let current = null;
    for (const d of trendDates) {
      const [m, dd] = d.split('/').map(Number);
      const date = new Date(year, m - 1, dd);
      const { monday } = getWeekRange(date);
      const wk = `${monday.getMonth()+1}/${monday.getDate()}`;
      if (!current || current.key !== wk) {
        const fri = new Date(monday);
        fri.setDate(monday.getDate() + 4);
        current = { key: wk, label: `${wk}–${fri.getMonth()+1}/${fri.getDate()}`, dates: [] };
        groups.push(current);
      }
      current.dates.push(d);
    }
    return groups;
  }, [trendDates, useWeeklyAgg]);

  const weeklySummary = useMemo(() => {
    if (!rawData) return [];
    return members.map(m => {
      let totalSum = 0, meetSum = 0, devSum = 0, count = 0;
      const dailyTotals = [];
      for (const d of dates) {
        const entry = rawData[d]?.[m];
        if (entry?.total != null) { totalSum += entry.total; count++; dailyTotals.push(entry.total); }
        if (entry?.meeting != null) { meetSum += entry.meeting; }
        if (entry?.dev != null) { devSum += entry.dev; }
      }
      const avg = count ? +(totalSum / count).toFixed(1) : null;
      const sum = count ? +totalSum.toFixed(1) : null;
      const devAvg = count ? +(devSum / count).toFixed(1) : null;
      const meetAvg = count ? +(meetSum / count).toFixed(1) : null;
      const stdDev = dailyTotals.length >= 2 ? Math.sqrt(dailyTotals.reduce((s, v) => s + (v - avg) * (v - avg), 0) / dailyTotals.length) : null;
      const maxStdDev = 3;
      const stabilityPct = stdDev !== null ? Math.max(0, 100 - (stdDev / maxStdDev) * 100) : 0;
      const stabilityColor = stabilityPct >= 70 ? COLORS.green : stabilityPct >= 40 ? COLORS.yellow : COLORS.orange;
      const v1 = rawData[dates[0]]?.[m]?.total ?? null;
      const v2 = rawData[dates[dates.length - 1]]?.[m]?.total ?? null;
      return { name: m, avg, sum, devAvg, meetAvg, daysReported: count, meetSum: +meetSum.toFixed(1), meetPct: sum ? Math.round(meetSum / sum * 100) : 0, trend: getTrendIcon(v1, v2), stdDev, stabilityPct, stabilityColor };
    }).sort((a, b) => (b.avg || -1) - (a.avg || -1));
  }, [rawData, dates, members]);

  const allIssues = useMemo(() => {
    const base = issues.filter(i => i.severity !== '🟢');
    if (!commitData) return base;
    for (const r of (commitData.projectRisks || [])) {
      base.push({ member: r.soloContributor, severity: r.severity, text: `${r.project.split('/').pop()} 單點貢獻` });
    }
    const activeAnalysis = commitData.analysis?.[activeDate] || {};
    for (const [m, a] of Object.entries(activeAnalysis)) {
      if (a.status === '🔴') {
        base.push({ member: m, severity: '🔴', text: `有 ${a.commitCount} commits 但未回報工時` });
      }
    }
    return base;
  }, [issues, commitData, activeDate]);

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
        <div style={{ width: 40, height: 40, border: `3px solid ${COLORS.border}`, borderTopColor: COLORS.accent, borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
        <p style={{ color: COLORS.textMuted, fontSize: 14, fontFamily: "'JetBrains Mono','SF Mono',monospace" }}>載入資料中...</p>
      </div>
    );
  }

  if (error) {
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ color: COLORS.red, fontSize: 16, fontFamily: "'JetBrains Mono','SF Mono',monospace" }}>載入失敗：{error}</p>
      </div>
    );
  }

  return (
    <div className="dashboard-container" style={{ minHeight: "100vh", background: "transparent", color: COLORS.text, padding: "24px 16px", fontFamily: "'JetBrains Mono','SF Mono','Noto Sans TC',monospace" }}>
      <div style={{ maxWidth: 1000, margin: "0 auto" }}>

        {/* Header */}
        <div className="animate-in" style={{ marginBottom: 24 }}>
          <h1 className="dashboard-title" style={{
            fontSize: 28, fontWeight: 800, margin: 0,
            fontFamily: "'Bricolage Grotesque','Noto Sans TC',sans-serif",
            background: "linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
          }}>
            工程部 Daily Update
          </h1>
          <p className="dashboard-subtitle" style={{ color: COLORS.textDim, fontSize: 13, marginTop: 6, letterSpacing: "0.02em" }}>
            工時追蹤・一致性分析・風險警示 — {dates[0]}~{dates[dates.length-1]}（{dates.length} 工作天）
          </p>
        </div>

        {/* Team Status Overview */}
        {(() => {
          const attentionIssues = allIssues;
          const stableIssues = issues.filter(i => i.severity === "🟢");
          const reportedCount = members.filter(m => {
            const latest = dates[dates.length - 1];
            return rawData?.[latest]?.[m]?.total != null;
          }).length;
          const latestData = rawData?.[dates[dates.length - 1]] || {};
          const teamVals = Object.values(latestData).filter(v => v.total != null).map(v => v.total);
          const teamAvg = teamVals.length ? +(teamVals.reduce((a, b) => a + b, 0) / teamVals.length).toFixed(1) : null;
          const actionHints = {
            "超時": "留意工作量分配",
            "未回報": "請確認是否需要協助",
            "連續": "建議主動聯繫",
            "工時偏低": "建議了解狀況",
            "不足": "建議了解狀況",
            "會議佔比": "留意會議時間",
          };
          const getHint = (text) => {
            for (const [key, hint] of Object.entries(actionHints)) {
              if (text.includes(key)) return hint;
            }
            return null;
          };
          return (
            <div className="animate-in" style={{ animationDelay: "0.05s", background: COLORS.card, borderRadius: 12, border: `1px solid ${COLORS.border}`, marginBottom: 20, overflow: "hidden" }}>
              <div className="status-overview" style={{ display: "flex", gap: 0 }}>
                {/* Left: KPI metrics */}
                <div className="status-kpis" style={{ display: "flex", gap: 0, borderRight: `1px solid ${COLORS.border}`, flexShrink: 0 }}>
                  <div style={{ padding: "16px 20px", borderRight: `1px solid ${COLORS.border}`, minWidth: 90, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: COLORS.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>回報率</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: reportedCount >= members.length ? COLORS.green : reportedCount >= members.length - 2 ? COLORS.yellow : COLORS.red, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>
                      {reportedCount}<span style={{ fontSize: 13, fontWeight: 500, color: COLORS.textDim }}>/{members.length}</span>
                    </div>
                  </div>
                  <div style={{ padding: "16px 20px", borderRight: `1px solid ${COLORS.border}`, minWidth: 90, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: COLORS.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>團隊均時</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: teamAvg ? getStatus(teamAvg).color : COLORS.textDim, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>
                      {teamAvg ?? "—"}<span style={{ fontSize: 11, fontWeight: 500, color: COLORS.textDim }}>hr</span>
                    </div>
                    {teamAvg && (
                      <div style={{ marginTop: 6, height: 3, borderRadius: 2, background: COLORS.bg, overflow: "hidden", width: 56, margin: "6px auto 0" }}>
                        <div style={{ height: "100%", width: `${Math.min(100, (teamAvg / 10) * 100)}%`, borderRadius: 2, background: getStatus(teamAvg).color, transition: "width 0.5s ease" }} />
                      </div>
                    )}
                  </div>
                  <div style={{ padding: "16px 20px", minWidth: 80, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: COLORS.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>需關注</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: attentionIssues.length > 0 ? COLORS.yellow : COLORS.green, lineHeight: 1.1 }}>
                      {attentionIssues.length}<span style={{ fontSize: 11, fontWeight: 500, color: COLORS.textDim }}>人</span>
                    </div>
                  </div>
                </div>

                {/* Right: Attention cards */}
                <div style={{ flex: 1, padding: "10px 16px", display: "flex", flexWrap: "wrap", gap: 8, alignContent: "center" }}>
                  {attentionIssues.length === 0 ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
                      <span style={{ fontSize: 12, color: COLORS.green, fontWeight: 600 }}>全員狀態正常</span>
                    </div>

                              })}
                              <td style={{ textAlign: "center", padding: "7px 8px", fontVariantNumeric: "tabular-nums", borderBottom: `1px solid ${COLORS.border}15` }}>
                                {avg !== null ? <span style={{ color: avgStatus.color, fontWeight: 700 }}>{avg}</span> : <span style={{ color: COLORS.textDim }}>—</span>}
                              </td>
                              <td style={{ textAlign: "center", padding: "7px 8px", borderBottom: `1px solid ${COLORS.border}15`, minWidth: 64 }}>
                                {stdDev !== null ? (
                                  <div style={{ display: "flex", alignItems: "center", gap: 4, justifyContent: "center" }}>
                                    <div style={{ width: 36, height: 5, borderRadius: 3, background: COLORS.bg, overflow: "hidden" }}>
                                      <div style={{ height: "100%", width: `${stabilityPct}%`, borderRadius: 3, background: stabilityColor, transition: "width 0.4s ease" }} />
                                    </div>
                                    <span style={{ fontSize: 10, color: stabilityColor, fontWeight: 600, minWidth: 14 }}>{stdDev.toFixed(1)}</span>
                                  </div>
                                ) : <span style={{ color: COLORS.textDim, fontSize: 10 }}>—</span>}
                              </td>
                              <td style={{ textAlign: "center", padding: "7px 6px", fontSize: 13, borderBottom: `1px solid ${COLORS.border}15` }}>{trend}</td>
                            </tr>
                          );
                        })}
                        {/* Team daily average row */}
                        <tr style={{ borderTop: `2px solid ${COLORS.border}` }}>
                          <td style={{ padding: "8px 8px", fontWeight: 700, whiteSpace: "nowrap", position: "sticky", left: 0, background: COLORS.card, zIndex: 1, color: COLORS.textMuted, fontSize: 12 }}>
                            團隊平均
                          </td>
                          {trendDates.map((d, i) => {
                            const dayVals = members.map(m => rawData[d]?.[m]?.total).filter(v => v != null);
                            const dayAvg = dayVals.length ? +(dayVals.reduce((a, b) => a + b, 0) / dayVals.length).toFixed(1) : null;
                            const st = getStatus(dayAvg);
                            return (
                              <td key={i} style={{ textAlign: "center", padding: "6px 6px", fontVariantNumeric: "tabular-nums", background: dayAvg !== null ? st.color + "0a" : "transparent" }}>
                                {dayAvg !== null ? <span style={{ color: st.color, fontWeight: 700, fontSize: 12 }}>{dayAvg}</span> : <span style={{ color: COLORS.textDim }}>—</span>}
                              </td>
                            );
                          })}
                          <td colSpan={3} />
                        </tr>
                      </tbody>
                    </table>
                  )}
                </div>
              </CardPanel>
            </div>
          </div>
        )}

        {/* ══ WEEKLY ══ */}
        {view === "weekly" && (
          <div>
            <div className="animate-in" style={{ animationDelay: "0.15s" }}>
              <CardPanel title="日均工時分佈（開發 + 會議）">
                <ResponsiveContainer width="100%" height={chartHeight}>
                  <BarChart data={weeklySummary} layout="vertical" margin={{ left: 8, right: 24, top: 4, bottom: 4 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} horizontal={false} />
                    <XAxis type="number" domain={[0, 10]} tick={{ fill: COLORS.textDim, fontSize: 11 }} axisLine={{ stroke: COLORS.border }} tickLine={false} unit="hr" />
                    <YAxis type="category" dataKey="name" width={48} tick={{ fill: COLORS.text, fontSize: 12, fontWeight: 600 }} axisLine={false} tickLine={false} />
                    <Tooltip content={<CustomTooltip />} />
                    <ReferenceLine x={THRESHOLDS.target} stroke={COLORS.green} strokeDasharray="6 4" strokeWidth={1.5} label={{ value: `${THRESHOLDS.target}hr`, fill: COLORS.green, fontSize: 11, position: "top" }} />
                    <ReferenceLine x={THRESHOLDS.ok} stroke={COLORS.yellow} strokeDasharray="4 4" strokeWidth={1} />
                    <Bar dataKey="devAvg" name="開發" stackId="a" fill={COLORS.accentLight} barSize={22} />
                    <Bar dataKey="meetAvg" name="會議" stackId="a" fill={COLORS.purple} radius={[0, 4, 4, 0]} barSize={22} />
                    <Legend wrapperStyle={{ fontSize: 12, color: COLORS.textMuted, paddingTop: 8 }} />
                  </BarChart>
                </ResponsiveContainer>
              </CardPanel>
            </div>

            <div className="animate-in" style={{ animationDelay: "0.2s" }}>
              <CardPanel title="週統計明細" padding={20}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: "0 2px", fontSize: 13, minWidth: isMobile ? 550 : "auto" }}>
                    <thead>
                      <tr>
                        {["成員", "回報", "總工時", "日均", "會議", "會議%", "穩定度", "趨勢"].map((h, i) => (
                          <th key={h} style={{ textAlign: h === "成員" ? "left" : "center", padding: "10px 8px", borderBottom: `1px solid ${COLORS.border}`, color: COLORS.textMuted, fontWeight: 600, fontSize: 11, whiteSpace: "nowrap", ...(i === 0 ? { position: "sticky", left: 0, background: COLORS.card, zIndex: 1 } : {}) }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {weeklySummary.map(m => {
                        const st = getStatus(m.avg);
                        const isHighlighted = selectedMembers.has(m.name);
                        return (
                          <tr key={m.name} onClick={() => {
                            const next = new Set(selectedMembers);
                            isHighlighted ? next.delete(m.name) : next.add(m.name);
                            setSelectedMembers(next);
                          }} style={{ cursor: "pointer", transition: "background 0.15s ease" }}>
                            <td style={{ padding: "9px 8px", fontWeight: 600, whiteSpace: "nowrap", position: "sticky", left: 0, background: isHighlighted ? memberColors[m.name] + "15" : COLORS.card, zIndex: 1, borderBottom: `1px solid ${COLORS.border}15` }}>
                              <ColorDot color={isHighlighted ? memberColors[m.name] : COLORS.textDim} />
                              <span style={{ color: isHighlighted ? memberColors[m.name] : COLORS.text }}>{m.name}</span>
                            </td>
                            <td style={{
                              textAlign: "center", padding: "9px 8px", fontVariantNumeric: "tabular-nums",
                              fontWeight: m.daysReported < dates.length ? 700 : 400,
                              color: m.daysReported < dates.length ? COLORS.yellow : COLORS.textMuted,
                              background: m.daysReported < dates.length - 2 ? COLORS.red + "12" : "transparent",
                              borderBottom: `1px solid ${COLORS.border}15`,
                            }}>
                              {m.daysReported}/{dates.length}
                            </td>
                            <td style={{ textAlign: "center", padding: "9px 8px", fontWeight: 600, fontVariantNumeric: "tabular-nums", borderBottom: `1px solid ${COLORS.border}15` }}>
                              {m.sum !== null ? m.sum : "—"}
                            </td>
                            <td style={{
                              textAlign: "center", padding: "9px 8px", fontWeight: 700, fontVariantNumeric: "tabular-nums",
                              color: st.color,
                              background: m.avg !== null ? st.color + "12" : "transparent",
                              borderBottom: `1px solid ${COLORS.border}15`,
                            }}>
                              {m.avg !== null ? m.avg : "—"}
                            </td>
                            <td style={{ textAlign: "center", padding: "9px 8px", fontVariantNumeric: "tabular-nums", color: COLORS.textMuted, borderBottom: `1px solid ${COLORS.border}15` }}>
                              {m.meetSum > 0 ? m.meetSum : "—"}
                            </td>
                            <td style={{
                              textAlign: "center", padding: "9px 8px",
                              background: m.meetPct > MEETING_HEAVY_PCT ? COLORS.yellow + "15" : "transparent",
                              borderBottom: `1px solid ${COLORS.border}15`,
                            }}>
                              <span style={{ color: m.meetPct > MEETING_HEAVY_PCT ? COLORS.yellow : m.meetPct > 30 ? COLORS.textMuted : COLORS.textDim, fontWeight: m.meetPct > MEETING_HEAVY_PCT ? 700 : 400 }}>
                                {m.sum ? `${m.meetPct}%` : "—"}{m.meetPct > MEETING_HEAVY_PCT ? " ⚠" : ""}
                              </span>
                            </td>
                            <td style={{ textAlign: "center", padding: "9px 8px", borderBottom: `1px solid ${COLORS.border}15`, minWidth: 64 }}>
                              {m.stdDev !== null ? (
                                <div style={{ display: "flex", alignItems: "center", gap: 4, justifyContent: "center" }}>
                                  <div style={{ width: 36, height: 5, borderRadius: 3, background: COLORS.bg, overflow: "hidden" }}>
                                    <div style={{ height: "100%", width: `${m.stabilityPct}%`, borderRadius: 3, background: m.stabilityColor, transition: "width 0.4s ease" }} />
                                  </div>
                                  <span style={{ fontSize: 10, color: m.stabilityColor, fontWeight: 600, minWidth: 14 }}>{m.stdDev.toFixed(1)}</span>
                                </div>
                              ) : <span style={{ color: COLORS.textDim, fontSize: 10 }}>—</span>}
                            </td>
                            <td style={{ textAlign: "center", padding: "9px 6px", fontSize: 13, borderBottom: `1px solid ${COLORS.border}15` }}>{m.trend}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </CardPanel>
            </div>
          </div>
        )}

        {/* ══ COMMITS ══ */}
        {view === "commits" && commitData && (
          <CommitsView commitData={commitData} dates={dates} members={members} memberColors={memberColors} leave={leave}
            activeDate={activeDate} onDateSelect={setSelectedDate} dailyDates={dailyDates} dayLabels={dayLabels} />
        )}

        {/* Footer */}
        <div className="footer-bar" style={{ marginTop: 28, paddingTop: 14, borderTop: `1px solid ${COLORS.border}`, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>
            ✅ {THRESHOLDS.ok}-{THRESHOLDS.high}hr ｜ ⚠️ {THRESHOLDS.low}-{THRESHOLDS.ok} / {THRESHOLDS.high}-{THRESHOLDS.overtime}hr ｜ ❌ &lt;{THRESHOLDS.low} / &gt;{THRESHOLDS.overtime}hr ｜ 會議 &gt;{MEETING_HEAVY_PCT}% ⚠
          </span>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>
            Daily Update Analyzer v2 — {dates.length} 工作天
          </span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
  </script>
</body>
</html>
